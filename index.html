<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberZone_95 Live Chatroom</title>

<style>
body {
    background-color: #000;
    color: #00FF00;
    font-family: "Courier New", Courier, monospace;
    padding: 15px;
    margin: 0;
}

.chat-window {
    border: 3px outset #808080;
    background-color: #c0c0c0;
    color: #000;
    width: 100%;
    max-width: 750px;
    margin: 0 auto;
}

.title-bar {
    background: linear-gradient(90deg, #000080, #0080fe);
    color: white;
    padding: 4px 8px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
}

.workspace {
    display: flex;
    background-color: #c0c0c0;
    padding: 10px;
    gap: 10px;
}

.chat-log {
    flex: 3;
    height: 300px;
    background: black;
    color: #00ff00;
    border: 3px inset #808080;
    padding: 8px;
    overflow-y: scroll;
}

.user-list {
    flex: 1;
    height: 300px;
    background: black;
    color: #00ffff;
    border: 3px inset #808080;
    padding: 8px;
    overflow-y: auto;
}

.input-bar {
    display: flex;
    padding: 10px;
    background: #c0c0c0;
}

.input-bar input {
    flex: 1;
    padding: 5px;
}

.btn-95 {
    margin-left: 5px;
}

.sys-msg { color: yellow; }
.user-tag { color: #ff00ff; font-weight: bold; }
.my-tag { color: #00ffff; font-weight: bold; }
.text-white { color: white; }

</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">
    <div>💬 CyberZone_95 Chat</div>
</div>

<div class="workspace">
    <div class="chat-log" id="chatLog"></div>

    <div class="user-list">
        <div style="color:#ffff00;">ONLINE USERS</div>
        <div id="userListBox"></div>
    </div>
</div>

<div class="input-bar">
    <input id="chatInput" placeholder="Type message...">
    <button id="sendBtn" class="btn-95">SEND</button>
</div>
</div>

<script>
// ---------- USER ----------
let currentAlias = "Guest_" + Math.floor(Math.random() * 9000);

// ---------- UI ----------
const chatLog = document.getElementById("chatLog");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");

// ---------- SOUND ----------
const aimSound = new Audio("aim-message.mp3");
function playAimSound() {
    aimSound.currentTime = 0;
    aimSound.play().catch(() => {});
}

// ---------- MQTT ----------
const topic = "luke_retro_global_open_lobby";
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ---------- USER TRACKING ----------
const users = {}; // { name: lastSeen }

function updateUserList() {
    const box = document.getElementById("userListBox");
    box.innerHTML = "";

    const now = Date.now();

    Object.keys(users).forEach(name => {
        if (now - users[name] < 60000) {
            const div = document.createElement("div");
            div.textContent = "• " + name;
            div.style.color = "#00ffff";
            box.appendChild(div);
        }
    });
}

// cleanup loop
setInterval(updateUserList, 5000);

// ---------- SYSTEM MESSAGE ----------
function system(msg) {
    const div = document.createElement("div");
    div.innerHTML = `<span class="sys-msg">*** ${msg}</span>`;
    chatLog.appendChild(div);
}

// ---------- CONNECT ----------
client.on("connect", () => {
    client.subscribe(topic);

    client.publish(topic, JSON.stringify({
        type: "join",
        sender: currentAlias
    }));
});

// ---------- MESSAGE ----------
client.on("message", (t, payload) => {
    const data = JSON.parse(payload.toString());

    users[data.sender] = Date.now();
    updateUserList();

    if (data.type === "join") {
        system(`${data.sender} joined the chat`);
        return;
    }

    if (data.sender !== currentAlias) {
        playAimSound();
    }

    const row = document.createElement("div");
    const time = data.timestamp || "--:--";

    row.innerHTML =
        `<span class="${data.sender === currentAlias ? "my-tag" : "user-tag"}">
        &lt;${data.sender}&gt;</span>
        <span style="color:#00ff00;"> [${time}] </span>
        <span class="text-white">${data.text}</span>`;

    chatLog.appendChild(row);
    chatLog.scrollTop = chatLog.scrollHeight;
});

// ---------- SEND ----------
function sendMsg() {
    const text = chatInput.value.trim();
    if (!text) return;

    // /nick command
    if (text.startsWith("/nick ")) {
        currentAlias = text.replace("/nick ", "").trim();
        system("You are now " + currentAlias);
        chatInput.value = "";
        return;
    }

    client.publish(topic, JSON.stringify({
        sender: currentAlias,
        text: text,
        timestamp: new Date().toLocaleTimeString([], {
            hour: "numeric",
            minute: "2-digit"
        })
    }));

    users[currentAlias] = Date.now();

    chatInput.value = "";
}

sendBtn.onclick = sendMsg;

chatInput.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMsg();
});
</script>

</body>
</html>
