<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CyberZone_95 Live Chatroom ⚡</title>
    <style>
        body { background-color: #000; color: #00FF00; font-family: "Courier New", Courier, monospace; padding: 15px; margin: 0; }
        .chat-window { border: 3px outset #808080; background-color: #c0c0c0; color: #000; width: 100%; max-width: 750px; margin: 0 auto; box-shadow: 5px 5px 0px #555; }
        .title-bar { background: linear-gradient(90deg, #000080, #0080fe); color: white; padding: 4px 8px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .title-controls span { background-color: #c0c0c0; color: black; border: 2px outset #fff; padding: 0 5px; font-size: 11px; cursor: pointer; margin-left: 2px; }
        marquee { background-color: #ff00ff; color: #ffffff; font-weight: bold; padding: 3px; font-size: 12px; border-bottom: 2px inset #fff; }
        .workspace { display: flex; background-color: #c0c0c0; padding: 10px; gap: 10px; }
        .chat-log { flex: 3; height: 300px; background-color: #000; color: #00ff00; border: 3px inset #808080; padding: 8px; overflow-y: scroll; font-size: 13px; line-height: 1.4; }
        .user-list { flex: 1; height: 300px; background-color: #000; color: #00ffff; border: 3px inset #808080; padding: 8px; overflow-y: auto; font-size: 13px; }
        .user-list h4 { color: #ffff00; margin: 0 0 8px 0; text-decoration: underline; font-size: 12px; }
        .sys-msg { color: #ffff00; }
        .user-tag { color: #ff00ff; font-weight: bold; }
        .my-tag { color: #00ffff; font-weight: bold; }
        .text-white { color: #ffffff; }
        .input-bar { background-color: #c0c0c0; padding: 10px; border-top: 2px solid #808080; display: flex; gap: 5px; }
        .input-bar input[type="text"] { flex: 1; background-color: #ffffff; color: #000000; border: 3px inset #808080; font-family: "Courier New", monospace; padding: 5px; font-size: 14px; outline: none; }
        .input-bar button { background-color: #c0c0c0; border: 2px outset #ffffff; font-family: "Courier New", monospace; font-weight: bold; padding: 0 15px; cursor: pointer; }
        .input-bar button:active { border: 2px inset #ffffff; }
        .visitor-counter { text-align: center; margin-top: 15px; font-size: 12px; color: #888; }
        .counter-badge { background: #222; color: #ff0000; padding: 2px 6px; border: 1px solid #444; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="chat-window">
    <div class="title-bar">
        <div>💬 CyberZone_95 Live Chatroom (v7.0 - Global Network)</div>
        <div class="title-controls"><span>_</span><span>X</span></div>
    </div>
    <marquee scrollamount="4">*** GLOBAL NETWORK NODE CONNECTED *** MESSAGES ARE STREAMING INTERNATIONALLY LIVE *** ENJOY THE ROOM ***</marquee>
    <div class="workspace">
        <div class="chat-log" id="chatLog">
            <div class="sys-msg" id="statusMessage">*** Syncing messages from global cloud router...</div>
        </div>
        <div class="user-list">
            <h4>YOUR PROFILE</h4>
            <div id="myUsername" style="color: #00ffff; font-weight: bold;"></div>
            <br>
            <div style="color: #ffff00; font-size: 11px;">SERVER STATUS:</div>
            <div style="color: #00ff00; font-size: 11px;">Online ✔</div>
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="chatInput" placeholder="Type text here..." autocomplete="off" maxlength="150">
        <button id="sendBtn">SEND</button>
    </div>
</div>
<div class="visitor-counter">YOU ARE HACKER VISITOR NUMBER: <span class="counter-badge">106842</span></div>

<script>
  // Clean variables with zero external library files or script modules required
  const currentAlias = "Guest_" + Math.floor(Math.random() * 9000 + 1000);
  document.getElementById('myUsername').textContent = `• ${currentAlias}`;

  const chatLog = document.getElementById('chatLog');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const statusMessage = document.getElementById('statusMessage');

  // Dedicated open database node created specifically for Luke's Room
  const routerUrl = "https://kvdb.io";
  let lastMessageCount = 0;

  // 1. Inbound Fetch Synchronizer: Requests latest chat list array from the internet every 2 seconds
  function syncMessages() {
      fetch(routerUrl)
      .then(response => response.json())
      .then(messagesList => {
          if (!Array.isArray(messagesList)) return;
          
          // Clear initial status line once data confirms synchronization
          if (statusMessage && chatLog.contains(statusMessage)) { statusMessage.remove(); }

          // Only paint new updates if the cloud array size has expanded
          if (messagesList.length > lastMessageCount) {
              // Extract only the newly added messages since our last check
              const newEntries = messagesList.slice(lastMessageCount);
              
              newEntries.forEach(msg => {
                  const row = document.createElement('div');
                  const tagClass = (msg.sender === currentAlias) ? 'my-tag' : 'user-tag';
                  row.innerHTML = `<span class="${tagClass}">&lt;${msg.sender}&gt;</span> <span class="text-white">${msg.text}</span>`;
                  chatLog.appendChild(row);
              });
              
              chatLog.scrollTop = chatLog.scrollHeight;
              lastMessageCount = messagesList.length;
          }
      })
      .catch(err => console.log("Lobby empty. Waiting for first transmission..."));
  }

  // 2. Outbound Push Transmitter: Appends your text string array to the cloud space
  function sendMsg() {
      const text = chatInput.value.trim();
      if (text === '') return;

      // First fetch current list history from the cloud router
      fetch(routerUrl)
      .then(res => res.json())
      .then(currentHistory => {
          let updatedList = Array.isArray(currentHistory) ? currentHistory : [];
          
          // Append the fresh layout message to history pile
          updatedList.push({ sender: currentAlias, text: text });

          // Keep only the last 35 messages so the chatroom stays fast and light
          if (updatedList.length > 35) { updatedList.shift(); }

          // PUT updated array back onto the internet node
          return fetch(routerUrl, {
              method: 'PUT',
              body: JSON.stringify(updatedList)
          });
      })
      .then(() => {
          // Immediately pull changes to render sent message
          syncMessages();
      });

      chatInput.value = '';
  }

  // Action listeners loop execution
  sendBtn.addEventListener('click', sendMsg);
  chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });

  // Start continuous cloud polling listener instantly every 2000 milliseconds
  setInterval(syncMessages, 2000);
  syncMessages();
</script>
</body>
</html>
