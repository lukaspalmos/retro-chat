<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:#0f0;
font-family:Courier New;
margin:0;
padding:15px;
}

.chat-window{
max-width:900px;
margin:auto;
background:#c0c0c0;
border:3px outset #888;
}

.title-bar{
background:linear-gradient(90deg,#000080,#0080ff);
color:#fff;
padding:6px;
font-weight:bold;
}

.workspace{display:flex;gap:10px;padding:10px;}

.chat-log{
flex:3;
height:340px;
background:#000;
border:3px inset #888;
overflow-y:auto;
padding:8px;
}

.user-list{
flex:1;
background:#000;
border:3px inset #888;
color:#0ff;
padding:8px;
font-size:13px;
}

.input-bar{
display:flex;
gap:5px;
padding:10px;
background:#c0c0c0;
flex-wrap:wrap;
}

.input-bar input{
flex:1;
padding:6px;
}

.msg{color:#fff;}
.sys{color:yellow;}

button{cursor:pointer;}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>
<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
<button id="imgBtn">Image</button>
<button id="clearBtn">Clear</button>
<input type="file" id="imgUpload" hidden>
</div>

</div>

<script>

// ================= ID SYSTEM (FIX FOR DUPLICATES) =================
const userId = localStorage.getItem("cyber_uid") || crypto.randomUUID();
localStorage.setItem("cyber_uid", userId);

// ================= USER =================
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ================= UI =================
const chatLog=document.getElementById("chatLog");
const chatInput=document.getElementById("chatInput");
const sendBtn=document.getElementById("sendBtn");
const clearBtn=document.getElementById("clearBtn");
const imgBtn=document.getElementById("imgBtn");
const imgUpload=document.getElementById("imgUpload");
const userListBox=document.getElementById("userListBox");

// ================= MQTT =================
const topic="luke_retro_global_open_lobby";
const client=mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ================= DATA =================
const users={}; 
let replyTarget=null;

// ================= SOUND =================
const notif=new Audio("aim-notif.mp3");

// ================= EMOJIS =================
const emojis={
":sob:":"😭",
":fire:":"🔥",
":heart:":"❤️",
":skull:":"💀",
":joy:":"😂",
":cool:":"😎",
":wave:":"👋",
":thumbsup:":"👍"
};

function parseEmojis(text){
for(const k in emojis){
text=text.split(k).join(emojis[k]);
}
return text;
}

// ================= USERS FIXED =================
function updateUsers(){
const now=Date.now();
userListBox.innerHTML="";

Object.values(users).forEach(u=>{
if(now-u.lastSeen<60000){
const div=document.createElement("div");
div.textContent="• "+u.name;
userListBox.appendChild(div);
}
});
}

// ================= SYSTEM =================
function sys(t){
const d=document.createElement("div");
d.className="sys";
d.textContent="*** "+t;
chatLog.appendChild(d);
}

// ================= CONNECT =================
client.on("connect",()=>{
client.subscribe(topic);

client.publish(topic,JSON.stringify({
type:"join",
id:userId,
name:currentAlias
}));
});

// ================= MESSAGE =================
client.on("message",(t,p)=>{
const d=JSON.parse(p.toString());

// JOIN
if(d.type==="join"){
if(!d.id) return;

users[d.id]={
name:d.name,
lastSeen:Date.now()
};

updateUsers();
sys(d.name+" joined");
return;
}

// CHAT
if(d.text!==undefined){

if(d.id){
users[d.id]={
name:d.sender,
lastSeen:Date.now()
};
updateUsers();
}

let text=parseEmojis(d.text);

const img=/https?:\/\/.*\.(png|jpg|jpeg|gif|webp)/i;
if(img.test(text)){
text=`<img src="${text}" style="max-width:200px;border:2px solid #0f0;">`;
}

if(d.sender!==currentAlias){
notif.currentTime=0;
notif.play().catch(()=>{});
}

const row=document.createElement("div");

row.innerHTML=
`<b style="color:${d.sender===currentAlias?"#0ff":"#f0f"}">
&lt;${d.sender}&gt;</b>
<span style="color:#0f0"> [${d.timestamp}] </span>
<span style="color:#fff">${text}</span>`;

chatLog.appendChild(row);
chatLog.scrollTop=chatLog.scrollHeight;
}
});

// ================= SEND =================
function send(){
let text=chatInput.value.trim();
if(!text) return;

// nickname
if(text.startsWith("/nick ")){
currentAlias=text.replace("/nick ","");

client.publish(topic,JSON.stringify({
type:"join",
id:userId,
name:currentAlias
}));

sys("you are now "+currentAlias);
chatInput.value="";
return;
}

// clear
if(text==="/clear"){
chatLog.innerHTML="";
sys("chat cleared");
chatInput.value="";
return;
}

text=parseEmojis(text);

client.publish(topic,JSON.stringify({
id:userId,
sender:currentAlias,
text,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
}));

chatInput.value="";
}

// ================= IMAGE UPLOAD =================
imgBtn.onclick=()=>imgUpload.click();

imgUpload.onchange=async e=>{
const file=e.target.files[0];
if(!file) return;

const form=new FormData();
form.append("file",file);
form.append("upload_preset","chat_upload");

const res=await fetch(
"https://api.cloudinary.com/v1_1/dbrruuftv/image/upload",
{method:"POST",body:form}
);

const data=await res.json();

client.publish(topic,JSON.stringify({
id:userId,
sender:currentAlias,
text:data.secure_url,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
}));
};

// ================= EVENTS =================
sendBtn.onclick=send;

chatInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});

clearBtn.onclick=()=>{
chatLog.innerHTML="";
sys("chat cleared");
};

</script>

</body>
</html>
