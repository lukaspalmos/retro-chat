<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:#0f0;
font-family:Courier New;
margin:0;
padding:15px;
}

.chat-window{
max-width:900px;
margin:auto;
background:#c0c0c0;
border:3px outset #888;
}

.title-bar{
background:linear-gradient(90deg,#000080,#0080ff);
color:#fff;
padding:6px;
font-weight:bold;
}

.workspace{display:flex;gap:10px;padding:10px;}

.chat-log{
flex:3;
height:340px;
background:#000;
border:3px inset #888;
overflow-y:auto;
padding:8px;
}

.user-list{
flex:1;
background:#000;
border:3px inset #888;
color:#0ff;
padding:8px;
font-size:13px;
}

.input-bar{
display:flex;
gap:5px;
padding:10px;
background:#c0c0c0;
}

.input-bar input{
flex:1;
padding:6px;
}

.sys{color:yellow;}

.replyBox{
background:#111;
border-left:4px solid yellow;
color:yellow;
padding:4px;
font-size:11px;
margin-bottom:4px;
}

.msgBtn{
font-size:11px;
margin-left:6px;
cursor:pointer;
}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>

<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
<button id="imgBtn">Image</button>
<button id="clearBtn">Clear</button>
<input type="file" id="imgUpload" hidden>
</div>

</div>

<script>

// ================= USER =================
const userId = crypto.randomUUID();
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ================= UI =================
const chatLog=document.getElementById("chatLog");
const chatInput=document.getElementById("chatInput");
const sendBtn=document.getElementById("sendBtn");
const clearBtn=document.getElementById("clearBtn");
const imgBtn=document.getElementById("imgBtn");
const imgUpload=document.getElementById("imgUpload");
const userListBox=document.getElementById("userListBox");

// ================= MQTT =================
const topic="luke_retro_global_open_lobby";
const client=mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ================= STATE =================
const users={};
let replyTarget=null;

// ================= SOUND =================
const notif=new Audio("aim-notif.mp3");

// ================= USERS =================
function renderUsers(){
userListBox.innerHTML="";
const now=Date.now();

Object.values(users).forEach(u=>{
if(now-u.lastSeen<60000){
const d=document.createElement("div");
d.textContent="• "+u.name;
userListBox.appendChild(d);
}
});
}

// ================= SYSTEM =================
function sys(t){
const d=document.createElement("div");
d.className="sys";
d.textContent="*** "+t;
chatLog.appendChild(d);
}

// ================= CONNECT =================
client.on("connect",()=>{
client.subscribe(topic);

client.publish(topic,JSON.stringify({
type:"join",
id:userId,
name:currentAlias
}));
});

// ================= MESSAGE =================
client.on("message",(t,p)=>{
const d=JSON.parse(p.toString());

if(d.type==="join"){
users[d.id]={name:d.name,lastSeen:Date.now()};
renderUsers();
sys(d.name+" joined");
return;
}

if(!d.text) return;

users[d.id||d.sender]={name:d.sender,lastSeen:Date.now()};
renderUsers();

if(d.sender!==currentAlias){
notif.currentTime=0;
notif.play().catch(()=>{});
}

// ================= MESSAGE =================
const row=document.createElement("div");

// 🔁 REPLY BLOCK (NOW REAL ID BASED)
if(d.reply){
const r=document.createElement("div");
r.className="replyBox";
r.textContent=`↳ ${d.reply.user}: ${d.reply.text}`;
row.appendChild(r);
}

// HEADER
const header=document.createElement("span");
header.style.color = d.sender===currentAlias ? "#0ff" : "#f0f";
header.textContent = `<${d.sender}> `;

// TIME
const time=document.createElement("span");
time.style.color="#0f0";
time.textContent=` [${d.timestamp}] `;

// CONTENT (IMAGE FIXED HERE)
const content=document.createElement("span");

if(d.type==="image"){
const img=document.createElement("img");
img.src=d.text;
img.style.maxWidth="200px";
img.style.border="2px solid #0f0";
content.appendChild(img);
} else {
content.textContent=" "+d.text;
}

// REPLY BUTTON (ALWAYS EXISTS)
const btn=document.createElement("button");
btn.className="msgBtn";
btn.textContent="Reply";
btn.onclick=()=>{
replyTarget={
id:d.msgId,
user:d.sender,
text:d.text
};
sys("replying to "+d.sender);
};

// BUILD
row.appendChild(header);
row.appendChild(time);
row.appendChild(content);
row.appendChild(btn);

chatLog.appendChild(row);
chatLog.scrollTop=chatLog.scrollHeight;
});

// ================= SEND =================
function send(){
let text=chatInput.value.trim();
if(!text) return;

// CLEAR
if(text==="/clear"){
chatLog.innerHTML="";
sys("chat cleared");
chatInput.value="";
return;
}

// NICK
if(text.startsWith("/nick ")){
currentAlias=text.replace("/nick ","");

client.publish(topic,JSON.stringify({
type:"join",
id:userId,
name:currentAlias
}));

sys("you are now "+currentAlias);
chatInput.value="";
return;
}

// MESSAGE ID (CRITICAL FIX)
const msgId=crypto.randomUUID();

const payload={
msgId,
id:userId,
sender:currentAlias,
text,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
};

if(replyTarget){
payload.reply=replyTarget;
replyTarget=null;
}

client.publish(topic,JSON.stringify(payload));
chatInput.value="";
}

// ================= IMAGE UPLOAD =================
imgBtn.onclick=()=>imgUpload.click();

imgUpload.onchange=async e=>{
const file=e.target.files[0];
if(!file) return;

const form=new FormData();
form.append("file",file);
form.append("upload_preset","chat_upload");

const res=await fetch(
"https://api.cloudinary.com/v1_1/dbrruuftv/image/upload",
{method:"POST",body:form}
);

const data=await res.json();

client.publish(topic,JSON.stringify({
msgId:crypto.randomUUID(),
id:userId,
sender:currentAlias,
type:"image",
text:data.secure_url,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
}));
};

// ================= EVENTS =================
sendBtn.onclick=send;

chatInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});

clearBtn.onclick=()=>{
chatLog.innerHTML="";
sys("chat cleared");
};

</script>

</body>
</html>
