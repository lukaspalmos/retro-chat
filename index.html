<!DOCTYPE html>
<html lang="en">
<head>

            padding: 15px; 
            margin: 0; 
        }
        /* Retro Windows System Border Style */
        .chat-window { 
            border: 3px outset #808080; 
            background-color: #c0c0c0; 
            color: #000; 
            width: 100%; 
            max-width: 750px; 
            margin: 0 auto; 
            box-shadow: 5px 5px 0px #555555; 
        }
        /* Title Bar */
        .title-bar { 
            background: linear-gradient(90deg, #000080, #0080fe); 
            color: white; 
            padding: 4px 8px; 
            font-weight: bold; 
            font-size: 14px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .title-controls span { 
            background-color: #c0c0c0; 
            color: black; 
            border: 2px outset #fff; 
            padding: 0 5px; 
            font-size: 11px; 
            cursor: pointer; 
            margin-left: 2px; 
        }
        /* System Marquee Warning */
        marquee { 
            background-color: #ff00ff; 
            color: #ffffff; 
            font-weight: bold; 
            padding: 3px; 
            font-size: 12px; 
            border-bottom: 2px inset #fff; 
        }
        /* Main Workspace holding the hidden P2P embed */
        .workspace { 
            background-color: #c0c0c0; 
            padding: 10px; 
        }
        iframe {
            width: 100%;
            height: 400px;
            border: 3px inset #808080;
            background: #000;
        }
        /* Retro Animated Counter at bottom */
        .visitor-counter { 
            text-align: center; 
            margin-top: 15px; 
            font-size: 12px; 
            color: #888; 
        }
        .counter-badge { 
            background: #222; 
            color: #ff0000; 
            padding: 2px 6px; 
            border: 1px solid #444; 
            font-weight: bold; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>

<div class="chat-window">
    <!-- 90s OS Window Title Bar -->
    <div class="title-bar">

        <div class="title-controls">
            <span>_</span>
