<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Live Chatroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#000; color:#0f0; font-family:Courier New; margin:0; padding:15px; }

.chat-window { max-width:800px; margin:auto; background:#c0c0c0; border:3px outset #888; }
.title-bar { background:linear-gradient(90deg,#000080,#0080ff); color:#fff; padding:6px; font-weight:bold; }

.workspace { display:flex; gap:10px; padding:10px; }

.chat-log {
    flex:3;
    height:320px;
    background:#000;
    border:3px inset #888;
    overflow-y:auto;
    padding:8px;
}

.user-list {
    flex:1;
    background:#000;
    border:3px inset #888;
    color:#0ff;
    padding:8px;
}

.input-bar {
    display:flex;
    gap:5px;
    padding:10px;
    background:#c0c0c0;
}

.input-bar input { flex:1; padding:6px; }

.sys { color:yellow; }
.user { color:#f0f; font-weight:bold; }
.me { color:#0ff; font-weight:bold; }
.msg { color:#fff; }

img.chat-img {
    max-width:200px;
    margin-top:5px;
    border:2px solid #0f0;
}

/* ---------- NEW UPLOAD UI ---------- */

#previewBox {
    display:none;
    background:#000;
    border:2px inset #888;
    padding:6px;
    margin:8px 10px;
    color:#0ff;
}

#previewBox img {
    max-width:120px;
    display:block;
    margin-top:5px;
    border:2px solid #0f0;
}

#progressBar {
    width:100%;
    height:10px;
    background:#222;
    border:1px solid #0f0;
    margin-top:5px;
}

#progressFill {
    height:100%;
    width:0%;
    background:#0f0;
}

</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>

<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<div id="typingBox" style="color:yellow; padding:4px 10px;"></div>

<!-- 👇 PREVIEW + PROGRESS UI -->
<div id="previewBox">
    <div>Image Preview:</div>
    <img id="previewImg">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="uploadStatus">Ready</div>
</div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
<button id="imgBtn">Image</button>
</div>

<input type="file" id="imgUpload" accept="image/*" style="display:none;">
</div>

<script>

// ---------- USER ----------
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ---------- UI ----------
const chatLog = document.getElementById("chatLog");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");
const imgBtn = document.getElementById("imgBtn");
const imgUpload = document.getElementById("imgUpload");

const previewBox = document.getElementById("previewBox");
const previewImg = document.getElementById("previewImg");
const progressFill = document.getElementById("progressFill");
const uploadStatus = document.getElementById("uploadStatus");

// ---------- SOUND ----------
const aimSound = new Audio("aim-message.mp3");
function playSound(){
    aimSound.currentTime=0;
    aimSound.play().catch(()=>{});
}

// ---------- MQTT ----------
const topic = "luke_retro_global_open_lobby";
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ---------- USERS ----------
const users = {};

// ---------- USER LIST ----------
function updateUsers(){
    const box=document.getElementById("userListBox");
    box.innerHTML="";
    const now=Date.now();

    Object.keys(users).forEach(u=>{
        if(now - users[u] < 60000){
            const d=document.createElement("div");
            d.textContent="• "+u;
            box.appendChild(d);
        }
    });
}
setInterval(updateUsers,5000);

// ---------- SYSTEM ----------
function sys(t){
    const d=document.createElement("div");
    d.innerHTML="*** "+t;
    d.style.color="yellow";
    chatLog.appendChild(d);
}

// ---------- RENDER ----------
function render(text){
    const img = /(https?:\/\/.*\.(png|jpg|jpeg|gif|webp))/i;
    if(img.test(text)){
        return `<img class="chat-img" src="${text}">`;
    }
    return `<span class="msg">${text}</span>`;
}

// ---------- CONNECT ----------
client.on("connect",()=>{
    client.subscribe(topic);
    client.publish(topic, JSON.stringify({
        type:"join",
        sender:currentAlias
    }));
});

// ---------- MESSAGE ----------
client.on("message",(t,p)=>{
    const d=JSON.parse(p.toString());

    if(d.type==="join"){
        users[d.sender]=Date.now();
        sys(d.sender+" joined");
        return;
    }

    users[d.sender]=Date.now();

    if(d.sender!==currentAlias) playSound();

    const time=d.timestamp||"--:--";

    const row=document.createElement("div");
    row.innerHTML=
    `<span style="color:${d.sender===currentAlias?"#0ff":"#f0f"}">
    <b>&lt;${d.sender}&gt;</b></span>
    <span style="color:#0f0"> [${time}] </span>
    ${render(d.text)}`;

    chatLog.appendChild(row);
    chatLog.scrollTop=chatLog.scrollHeight;
});

// ---------- SEND ----------
function send(){
    const text=chatInput.value.trim();
    if(!text) return;

    if(text==="/clear"){
        chatLog.innerHTML="";
        sys("cleared");
        chatInput.value="";
        return;
    }

    if(text.startsWith("/nick ")){
        currentAlias=text.replace("/nick ","");
        sys("you are now "+currentAlias);
        chatInput.value="";
        return;
    }

    client.publish(topic, JSON.stringify({
        sender:currentAlias,
        text:text,
        timestamp:new Date().toLocaleTimeString([],{
            hour:"numeric",
            minute:"2-digit"
        })
    }));

    users[currentAlias]=Date.now();
    chatInput.value="";
}

// ---------- IMAGE UPLOAD (WITH PREVIEW + PROGRESS) ----------
imgBtn.onclick=()=>imgUpload.click();

imgUpload.onchange=async e=>{
    const file=e.target.files[0];
    if(!file) return;

    // ---------- PREVIEW ----------
    previewBox.style.display="block";
    previewImg.src=URL.createObjectURL(file);
    uploadStatus.textContent="Uploading...";

    progressFill.style.width="0%";

    const form=new FormData();
    form.append("file",file);
    form.append("upload_preset","chat_upload");

    // ---------- UPLOAD WITH PROGRESS ----------
    const xhr = new XMLHttpRequest();
    xhr.open("POST","https://api.cloudinary.com/v1_1/dbrruuftv/image/upload");

    xhr.upload.onprogress = (e)=>{
        if(e.lengthComputable){
            const percent = (e.loaded/e.total)*100;
            progressFill.style.width = percent+"%";
        }
    };

    xhr.onload = ()=>{
        const data = JSON.parse(xhr.responseText);

        uploadStatus.textContent="Uploaded ✔";

        client.publish(topic, JSON.stringify({
            sender:currentAlias,
            text:data.secure_url,
            timestamp:new Date().toLocaleTimeString([],{
                hour:"numeric",
                minute:"2-digit"
            })
        }));

        users[currentAlias]=Date.now();

        setTimeout(()=>{
            previewBox.style.display="none";
            progressFill.style.width="0%";
            uploadStatus.textContent="Ready";
        },1000);
    };

    xhr.send(form);
};

// ---------- EVENTS ----------
sendBtn.onclick=send;
chatInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") send();
});

</script>

</body>
</html>
