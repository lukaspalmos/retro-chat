<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CyberZone_95 Live Chatroom ⚡</title>
    <style>
        body { background-color: #000; color: #00FF00; font-family: "Courier New", Courier, monospace; padding: 15px; margin: 0; }
        .chat-window { border: 3px outset #808080; background-color: #c0c0c0; color: #000; width: 100%; max-width: 750px; margin: 0 auto; box-shadow: 5px 5px 0px #555; }
        .title-bar { background: linear-gradient(90deg, #000080, #0080fe); color: white; padding: 4px 8px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .title-controls span { background-color: #c0c0c0; color: black; border: 2px outset #fff; padding: 0 5px; font-size: 11px; cursor: pointer; margin-left: 2px; }
        marquee { background-color: #ff00ff; color: #ffffff; font-weight: bold; padding: 3px; font-size: 12px; border-bottom: 2px inset #fff; }
        .workspace { display: flex; background-color: #c0c0c0; padding: 10px; gap: 10px; }
        .chat-log { flex: 3; height: 300px; background-color: #000; color: #00ff00; border: 3px inset #808080; padding: 8px; overflow-y: scroll; font-size: 13px; line-height: 1.4; }
        .user-list { flex: 1; height: 300px; background-color: #000; color: #00ffff; border: 3px inset #808080; padding: 8px; overflow-y: auto; font-size: 13px; }
        .user-list h4 { color: #ffff00; margin: 0 0 8px 0; text-decoration: underline; font-size: 12px; }
        .sys-msg { color: #ffff00; }
        .user-tag { color: #ff00ff; font-weight: bold; }
        .my-tag { color: #00ffff; font-weight: bold; }
        .text-white { color: #ffffff; }
        .input-bar { background-color: #c0c0c0; padding: 10px; border-top: 2px solid #808080; display: flex; gap: 5px; }
        .input-bar input[type="text"] { flex: 1; background-color: #ffffff; color: #000000; border: 3px inset #808080; font-family: "Courier New", monospace; padding: 5px; font-size: 14px; outline: none; }
        
        .btn-95 { background-color: #c0c0c0; border: 2px outset #ffffff; font-family: "Courier New", monospace; font-weight: bold; padding: 5px 15px; cursor: pointer; font-size: 13px; }
        .btn-95:active { border: 2px inset #ffffff; }
        .setup-box { background-color: #a0a0a0; padding: 8px; border: 2px inset #fff; font-size: 11px; color: black; font-weight: bold; margin-top: 10px; }
        .setup-box input { width: 90%; margin-top: 4px; padding: 2px; font-family: monospace; font-size: 11px; color: black; background: white; border: 2px inset #808080; }
    </style>
    <!-- Load completely robust universal script bundle with fallback support -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

<div class="chat-window">
    <div class="title-bar">
        <div>💬 CyberZone_95 Peer Chatroom (v8.1 - Final Build)</div>
        <div class="title-controls"><span>_</span><span>X</span></div>
    </div>
    <marquee scrollamount="4">*** SECURE LINK ACTIVE *** GENERATE A KEY OR ENTER A FRIEND'S KEY TO TALK LIVE ***</marquee>
    <div class="workspace">
        <div class="chat-log" id="chatLog">
            <div class="sys-msg" id="statusMessage">*** Waiting for you to create or join a room...</div>
        </div>
        <div class="user-list">
            <h4>YOUR PROFILE</h4>
            <div id="myUsername" style="color: #00ffff; font-weight: bold; margin-bottom: 8px;"></div>
            
            <div class="setup-box">
                <div>1. CREATE A ROOM:</div>
                <button id="createBtn" class="btn-95" style="font-size:11px; padding:2px 5px; margin:4px 0;">Get Room Key</button>
                <input type="text" id="myKeyDisplay" readonly placeholder="Key pops up here...">
            </div>

            <div class="setup-box">
                <div>2. JOIN A ROOM:</div>
                <input type="text" id="joinKeyInput" placeholder="Paste friend's key here...">
                <button id="joinBtn" class="btn-95" style="font-size:11px; padding:2px 5px; margin-top:4px;">Connect</button>
            </div>
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="chatInput" placeholder="Type text here..." autocomplete="off" maxlength="150">
        <button id="sendBtn" class="btn-95">SEND</button>
    </div>
</div>
<div class="visitor-counter">YOU ARE HACKER VISITOR NUMBER: <span class="counter-badge">106954</span></div>

<script>
  // Simple classic browser script logic layer
  const currentAlias = "Guest_" + Math.floor(Math.random() * 9000 + 1000);
  document.getElementById('myUsername').textContent = `• ${currentAlias}`;

  const chatLog = document.getElementById('chatLog');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const createBtn = document.getElementById('createBtn');
  const myKeyDisplay = document.getElementById('myKeyDisplay');
  const joinKeyInput = document.getElementById('joinKeyInput');
  const joinBtn = document.getElementById('joinBtn');

  // Instantiate universal global broker instance connection stream
  const client = new StompJs.Client({
    brokerURL: "wss://://hivemq.com",
    connectHeaders: { login: "guest", passcode: "guest" }
  });

  let currentRoomTopic = null;

  client.onConnect = function (frame) {
      console.log("WebSocket engine data pipeline connected.");
  };

  client.activate();

  // Create Key Button Click
  createBtn.addEventListener('click', () => {
      const uniqueRoomId = "room_" + Math.floor(Math.random() * 899999 + 100000);
      myKeyDisplay.value = uniqueRoomId;
      listenToRoom(uniqueRoomId);
      printSystem("Room created! Send your key to a friend. You can chat now.");
  });

  // Join Button Click
  joinBtn.addEventListener('click', () => {
      const targetRoom = joinKeyInput.value.trim();
      if (!targetRoom) return alert("Please paste a valid room key first!");
      listenToRoom(targetRoom);
      printSystem(`Successfully hopped inside room node: ${targetRoom}`);
  });

  function listenToRoom(roomId) {
      if (currentRoomTopic) return; // Lock subscription process
      currentRoomTopic = `/topic/luke_retro_${roomId}`;
      
      client.subscribe(currentRoomTopic, function (message) {
          const data = JSON.parse(message.body);
          const statusText = document.getElementById('statusMessage');
          if (statusText) statusText.remove();

          const row = document.createElement('div');
          const tagClass = (data.sender === currentAlias) ? 'my-tag' : 'user-tag';
          row.innerHTML = `<span class="${tagClass}">&lt;${data.sender}&gt;</span> <span class="text-white">${data.text}</span>`;
          chatLog.appendChild(row);
          chatLog.scrollTop = chatLog.scrollHeight;
      });
  }

  function sendMsg() {
      const text = chatInput.value.trim();
      if (text === '') return;
      
      if (!currentRoomTopic) {
          alert("You must click 'Get Room Key' or join a room key code before sending messages!");
          return;
      }

      client.publish({
          destination: currentRoomTopic,
          body: JSON.stringify({ sender: currentAlias, text: text })
      });

      chatInput.value = '';
  }

  function printSystem(msg) {
      const statusText = document.getElementById('statusMessage');
      if (statusText) statusText.remove();
      const row = document.createElement('div');
      row.className = 'sys-msg';
      row.id = 'statusMessage';
      row.textContent = "*** " + msg;
      chatLog.appendChild(row);
  }

  sendBtn.addEventListener('click', sendMsg);
  chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
