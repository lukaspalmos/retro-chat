<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:#0f0;
font-family:Courier New;
margin:0;
padding:15px;
}

.chat-window{
max-width:900px;
margin:auto;
background:#c0c0c0;
border:3px outset #888;
}

.title-bar{
background:linear-gradient(90deg,#000080,#0080ff);
color:#fff;
padding:6px;
font-weight:bold;
}

.workspace{display:flex;gap:10px;padding:10px;}

.chat-log{
flex:3;
height:340px;
background:#000;
border:3px inset #888;
overflow-y:auto;
padding:8px;
}

.user-list{
flex:1;
background:#000;
border:3px inset #888;
color:#0ff;
padding:8px;
font-size:13px;
}

.input-bar{
display:flex;
gap:5px;
padding:10px;
background:#c0c0c0;
}

.input-bar input{
flex:1;
padding:6px;
}

.sys{color:yellow;}
button{cursor:pointer;font-size:11px;margin-left:6px;}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>

<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
<button id="clearBtn">Clear</button>
</div>

</div>

<script>

// ================= USER =================
const userId = crypto.randomUUID();
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ================= UI =================
const chatLog=document.getElementById("chatLog");
const chatInput=document.getElementById("chatInput");
const sendBtn=document.getElementById("sendBtn");
const clearBtn=document.getElementById("clearBtn");
const userListBox=document.getElementById("userListBox");

// ================= MQTT =================
const topic="luke_retro_global_open_lobby";
const client=mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ================= USERS (FIXED STRUCTURE) =================
const users = {};

// ================= SOUND =================
const notif=new Audio("aim-notif.mp3");

// ================= ONLINE USERS RENDER =================
function renderUsers(){
userListBox.innerHTML="";

const now=Date.now();

Object.values(users).forEach(u=>{
if(now - u.lastSeen < 60000){
const div=document.createElement("div");
div.textContent="• "+u.name;
userListBox.appendChild(div);
}
});
}

// periodic cleanup (IMPORTANT FIX)
setInterval(renderUsers, 3000);

// ================= SYSTEM =================
function sys(t){
const d=document.createElement("div");
d.className="sys";
d.textContent="*** "+t;
chatLog.appendChild(d);
chatLog.scrollTop=chatLog.scrollHeight;
}

// ================= CONNECT =================
client.on("connect",()=>{
client.subscribe(topic);

client.publish(topic,JSON.stringify({
type:"join",
id:userId,
name:currentAlias
}));
});

// ================= MESSAGE =================
client.on("message",(t,p)=>{
const d=JSON.parse(p.toString());

// JOIN EVENT
if(d.type==="join"){
if(!d.id || !d.name) return;

users[d.id]={
name:d.name,
lastSeen:Date.now()
};

renderUsers();
sys(d.name+" joined");
return;
}

// CHAT EVENT
if(!d.text) return;

// ALWAYS update sender presence (FIXED)
const uid = d.id || d.sender;

if(uid){
users[uid]={
name:d.sender,
lastSeen:Date.now()
};
}

renderUsers();

// sound
if(d.sender !== currentAlias){
notif.currentTime=0;
notif.play().catch(()=>{});
}

// build message (FULL DOM SAFE)
const row=document.createElement("div");

const header=document.createElement("span");
header.style.color = d.sender===currentAlias ? "#0ff" : "#f0f";
header.textContent = `<${d.sender}> `;

const time=document.createElement("span");
time.style.color="#0f0";
time.textContent=` [${d.timestamp}] `;

const text=document.createElement("span");
text.style.color="#fff";
text.textContent=" "+d.text;

// ALWAYS VISIBLE REPLY BUTTON (FIXED)
const replyBtn=document.createElement("button");
replyBtn.textContent="Reply";

replyBtn.onclick=()=>{
sys("replying to "+d.sender+": "+d.text);
};

// assemble
row.appendChild(header);
row.appendChild(time);
row.appendChild(text);
row.appendChild(replyBtn);

chatLog.appendChild(row);
chatLog.scrollTop=chatLog.scrollHeight;
});

// ================= SEND =================
function send(){
let text=chatInput.value.trim();
if(!text) return;

// nick
if(text.startsWith("/nick ")){
currentAlias=text.replace("/nick ","");

client.publish(topic,JSON.stringify({
type:"join",
id:userId,
name:currentAlias
}));

sys("you are now "+currentAlias);
chatInput.value="";
return;
}

// clear
if(text==="/clear"){
chatLog.innerHTML="";
sys("chat cleared");
chatInput.value="";
return;
}

client.publish(topic,JSON.stringify({
id:userId,
sender:currentAlias,
text:text,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
}));

chatInput.value="";
}

// ================= EVENTS =================
sendBtn.onclick=send;

chatInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});

clearBtn.onclick=()=>{
chatLog.innerHTML="";
sys("chat cleared");
};

</script>

</body>
</html>
