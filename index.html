<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Live Chatroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#000; color:#0f0; font-family:Courier New; margin:0; padding:15px; }

.chat-window {
    max-width:850px;
    margin:auto;
    background:#c0c0c0;
    border:3px outset #888;
}

.title-bar {
    background:linear-gradient(90deg,#000080,#0080ff);
    color:#fff;
    padding:6px;
    font-weight:bold;
}

.workspace { display:flex; gap:10px; padding:10px; }

.chat-log {
    flex:3;
    height:330px;
    background:#000;
    border:3px inset #888;
    overflow-y:auto;
    padding:8px;
}

.user-list {
    flex:1;
    background:#000;
    border:3px inset #888;
    color:#0ff;
    padding:8px;
    font-size:13px;
}

.input-bar {
    display:flex;
    gap:5px;
    padding:10px;
    background:#c0c0c0;
    flex-wrap:wrap;
}

.input-bar input {
    flex:1;
    padding:6px;
}

.msg { color:#fff; }
.sys { color:yellow; }

img.chat-img {
    max-width:200px;
    border:2px solid #0f0;
    margin-top:5px;
}

/* ---------- EMOJI ---------- */
#emojiBox {
    width:100%;
    background:#000;
    border:2px inset #888;
    color:#0ff;
    font-size:12px;
    padding:4px;
    display:none;
}

.emoji-item {
    padding:2px;
    cursor:pointer;
}
.emoji-item:hover { background:#111; }

/* ---------- TYPING ---------- */
#typingBox {
    color:yellow;
    font-size:12px;
    padding:4px 10px;
    min-height:18px;
}

/* ---------- IMAGE UPLOAD ---------- */
#previewBox {
    display:none;
    background:#000;
    border:2px inset #888;
    padding:6px;
    margin:8px 0;
    color:#0ff;
}

#previewBox img {
    max-width:120px;
    border:2px solid #0f0;
    margin-top:5px;
}

#progressBar {
    width:100%;
    height:10px;
    background:#222;
    border:1px solid #0f0;
    margin-top:5px;
}

#progressFill {
    height:100%;
    width:0%;
    background:#0f0;
}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>

<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<div id="emojiBox"></div>
<div id="typingBox"></div>

<div id="previewBox">
    <div>Image Preview:</div>
    <img id="previewImg">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="uploadStatus">Ready</div>
</div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message... (:sob: :fire: :heart:)">
<button id="sendBtn">Send</button>
<button id="imgBtn">Image</button>
</div>

<input type="file" id="imgUpload" accept="image/*" style="display:none;">
</div>

<script>

// ---------- USER ----------
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ---------- UI ----------
const chatLog = document.getElementById("chatLog");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");
const imgBtn = document.getElementById("imgBtn");
const imgUpload = document.getElementById("imgUpload");

const emojiBox = document.getElementById("emojiBox");
const typingBox = document.getElementById("typingBox");

const previewBox = document.getElementById("previewBox");
const previewImg = document.getElementById("previewImg");
const progressFill = document.getElementById("progressFill");
const uploadStatus = document.getElementById("uploadStatus");

// ---------- DATA ----------
const emojis = {
":sob:":"😭", ":fire:":"🔥", ":heart:":"❤️",
":skull:":"💀", ":joy:":"😂", ":cool:":"😎",
":wave:":"👋", ":thumbsup:":"👍",
":broken:":"💔", ":speak:":"🗣️",
":peak:":"🥹", ":twin:":"✌️", ":wilt:":"🥀"
};

const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");
const topic = "luke_retro_global_open_lobby";

const users = {};
const typingUsers = {};

// ---------- SOUND ----------
const aimSound = new Audio("aim-message.mp3");
function playSound(){
aimSound.currentTime=0;
aimSound.play().catch(()=>{});
}

// ---------- SYSTEM ----------
function sys(t){
const d=document.createElement("div");
d.innerHTML="*** "+t;
d.style.color="yellow";
chatLog.appendChild(d);
}

// ---------- RENDER ----------
function render(text){
if(!text) return "";
const img=/(https?:\/\/.*\.(png|jpg|jpeg|gif|webp))/i;
if(img.test(text)) return `<img class="chat-img" src="${text}">`;
return `<span class="msg">${text}</span>`;
}

// ---------- EMOJI ----------
function parseEmojis(text){
Object.keys(emojis).forEach(e=>{
text=text.split(e).join(emojis[e]);
});
return text;
}

// ---------- ONLINE USERS ----------
function updateUsers(){
const box=document.getElementById("userListBox");
box.innerHTML="";
const now=Date.now();

Object.keys(users).forEach(u=>{
if(now-users[u]<60000){
const d=document.createElement("div");
d.textContent="• "+u;
box.appendChild(d);
}
});
}
setInterval(updateUsers,5000);

// ---------- TYPING (BLINKING DOTS) ----------
let dotIndex = 0;

function updateTyping(){
const names = Object.keys(typingUsers).filter(u=>u!==currentAlias);

if(names.length===0){
typingBox.textContent="";
return;
}

dotIndex = (dotIndex + 1) % 4;
const dots = ".".repeat(dotIndex);

typingBox.textContent = `${names.join(", ")} is typing${dots}`;
}

// blink animation
setInterval(updateTyping, 400);

// ---------- CONNECT ----------
client.on("connect",()=>{
client.subscribe(topic);
client.publish(topic, JSON.stringify({
type:"join",
sender:currentAlias
}));
});

// ---------- MESSAGE ----------
client.on("message",(t,p)=>{
const d=JSON.parse(p.toString());

if(d.type==="join"){
users[d.sender]=Date.now();
sys(d.sender+" joined");
return;
}

if(d.type==="typing"){
typingUsers[d.sender]=true;
return;
}

if(d.type==="stopTyping"){
delete typingUsers[d.sender];
return;
}

users[d.sender]=Date.now();
if(d.sender!==currentAlias) playSound();

const row=document.createElement("div");
row.innerHTML=
`<span style="color:${d.sender===currentAlias?"#0ff":"#f0f"}">
<b>&lt;${d.sender}&gt;</b></span>
<span style="color:#0f0"> [${d.timestamp||"--:--"}] </span>
${render(d.text||"")}`;

chatLog.appendChild(row);
chatLog.scrollTop=chatLog.scrollHeight;
});

// ---------- TYPING SEND ----------
let typingTimeout;

chatInput.addEventListener("input",()=>{

client.publish(topic, JSON.stringify({
type:"typing",
sender:currentAlias
}));

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{
client.publish(topic, JSON.stringify({
type:"stopTyping",
sender:currentAlias
}));
},1200);

// emoji suggestions
const value=chatInput.value;
const match=value.match(/:[a-zA-Z0-9_]*$/);

if(match){
const q=match[0];
const results=Object.keys(emojis).filter(e=>e.startsWith(q)).slice(0,5);

if(results.length){
emojiBox.style.display="block";
emojiBox.innerHTML=results.map(e=>
`<div class="emoji-item" onclick="insertEmoji('${e}')">
${e} → ${emojis[e]}
</div>`
).join("");
} else emojiBox.style.display="none";

} else emojiBox.style.display="none";
});

window.insertEmoji=function(code){
chatInput.value=chatInput.value.replace(/:[a-zA-Z0-9_]*$/,code);
emojiBox.style.display="none";
};

// ---------- SEND ----------
function send(){
let text=chatInput.value.trim();
if(!text) return;

if(text==="/clear"){
chatLog.innerHTML="";
sys("cleared");
return;
}

if(text.startsWith("/nick ")){
currentAlias=text.replace("/nick ","");
sys("you are now "+currentAlias);
return;
}

text=parseEmojis(text);

client.publish(topic, JSON.stringify({
sender:currentAlias,
text:text,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
}));

chatInput.value="";
}

// ---------- IMAGE UPLOAD ----------
imgBtn.onclick=()=>imgUpload.click();

imgUpload.onchange=e=>{
const file=e.target.files[0];
if(!file) return;

previewBox.style.display="block";
previewImg.src=URL.createObjectURL(file);
uploadStatus.textContent="Uploading...";
progressFill.style.width="0%";

const form=new FormData();
form.append("file",file);
form.append("upload_preset","chat_upload");

const xhr=new XMLHttpRequest();
xhr.open("POST","https://api.cloudinary.com/v1_1/dbrruuftv/image/upload");

xhr.upload.onprogress=e=>{
if(e.lengthComputable){
progressFill.style.width=(e.loaded/e.total)*100+"%";
}
};

xhr.onload=()=>{
const data=JSON.parse(xhr.responseText);

client.publish(topic,{
sender:currentAlias,
text:data.secure_url,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
});

uploadStatus.textContent="Uploaded ✔";
setTimeout(()=>previewBox.style.display="none",1000);
};

xhr.send(form);
};

// ---------- EVENTS ----------
sendBtn.onclick=send;
chatInput.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
