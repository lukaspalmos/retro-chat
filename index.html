<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CyberZone_95 Live Chatroom ⚡</title>
    <style>
        body { background-color: #000; color: #00FF00; font-family: "Courier New", Courier, monospace; padding: 15px; margin: 0; }
        .chat-window { border: 3px outset #808080; background-color: #c0c0c0; color: #000; width: 100%; max-width: 750px; margin: 0 auto; box-shadow: 5px 5px 0px #555; }
        .title-bar { background: linear-gradient(90deg, #000080, #0080fe); color: white; padding: 4px 8px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .title-controls span { background-color: #c0c0c0; color: black; border: 2px outset #fff; padding: 0 5px; font-size: 11px; cursor: pointer; margin-left: 2px; }
        marquee { background-color: #ff00ff; color: #ffffff; font-weight: bold; padding: 3px; font-size: 12px; border-bottom: 2px inset #fff; }
        .workspace { display: flex; background-color: #c0c0c0; padding: 10px; gap: 10px; }
        .chat-log { flex: 3; height: 300px; background-color: #000; color: #00ff00; border: 3px inset #808080; padding: 8px; overflow-y: scroll; font-size: 13px; line-height: 1.4; }
        .user-list { flex: 1; height: 300px; background-color: #000; color: #00ffff; border: 3px inset #808080; padding: 8px; overflow-y: auto; font-size: 13px; }
        .user-list h4 { color: #ffff00; margin: 0 0 8px 0; text-decoration: underline; font-size: 12px; }
        .sys-msg { color: #ffff00; }
        .text-white { color: #ffffff; }
        .input-bar { background-color: #c0c0c0; padding: 10px; border-top: 2px solid #808080; display: flex; gap: 5px; }
        .input-bar input[type="text"] { flex: 1; background-color: #ffffff; color: #000000; border: 3px inset #808080; font-family: "Courier New", monospace; padding: 5px; font-size: 14px; outline: none; }
        .btn-95 { background-color: #c0c0c0; border: 2px outset #ffffff; font-family: "Courier New", monospace; font-weight: bold; padding: 5px 15px; cursor: pointer; font-size: 13px; }
        .btn-95:active { border: 2px inset #ffffff; }
    </style>
    <!-- PeerJS is an open P2P engine that connects different browsers directly via real-time sockets -->
    <script src="https://unpkg.com"></script>
</head>
<body>

<div class="chat-window">
    <div class="title-bar">
        <div>💬 CyberZone_95 Live Chatroom (v20.0 - Peer Mesh)</div>
        <div class="title-controls"><span>_</span><span>X</span></div>
    </div>
    <marquee scrollamount="4">*** CHATROOM RUNNING SECURE DIRECT LINKING ENGINE *** MESSAGES DELIVER INTERNATIONALLY LIVE OVER WEB-RTC ***</marquee>
    <div class="workspace">
        <div class="chat-log" id="chatLog">
            <div class="sys-msg" id="statusMessage">*** Starting direct peer-to-peer data engine...</div>
        </div>
        <div class="user-list">
            <h4>YOUR PROFILE</h4>
            <div id="myUsername" style="font-weight: bold; margin-bottom: 8px;"></div>
            <br>
            <div style="color: #ffff00; font-size: 11px;">SERVER STATUS:</div>
            <div id="serverStatus" style="color: #ff0000; font-size: 11px;">Connecting...</div>
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="chatInput" placeholder="Type text here..." autocomplete="off" maxlength="150">
        <button id="sendBtn" class="btn-95">SEND</button>
    </div>
</div>
<div class="visitor-counter">YOU ARE HACKER VISITOR NUMBER: <span class="counter-badge">112044</span></div>

<script>
  // 1. Username prompt customization selection
  let requestedName = prompt("⚡ WELCOME TO CYBERZONE_95 ⚡\nEnter your custom hacker alias:", "Hacker_Guest");
  if (!requestedName || requestedName.trim() === "") {
      requestedName = "Guest_" + Math.floor(Math.random() * 9000 + 1000);
  }
  const currentAlias = requestedName.trim().substring(0, 15);

  const chatLog = document.getElementById('chatLog');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const statusMessage = document.getElementById('statusMessage');
  const serverStatus = document.getElementById('serverStatus');

  const availableColors = ["#ff00ff", "#00ffff", "#ffff00", "#ff3333", "#ff9900", "#ccff00", "#00ffcc", "#ff66cc", "#99ff33", "#ffcc00"];
  let myHexColor = availableColors[Math.floor(Math.random() * availableColors.length)];

  document.getElementById('myUsername').textContent = `• ${currentAlias}`;
  document.getElementById('myUsername').style.color = myHexColor;

  // 2. Open Global Mesh Topology Routing Logic via public fallback STUN networks
  // Everyone uses this static channel code key to cross-discover each other instantly over the open web
  const sharedGlobalLobbyId = "luke_retro_public_mesh_lobby_v20";
  
  // Set up the Peer instance with a specific target ID
  let peer;
  let connectionPool = [];

  function initializePeer() {
      // First, try to claim the primary listener node ID
      peer = new Peer(sharedGlobalLobbyId, {
          config: {'iceServers': [{ 'urls': 'stun:://google.com' }]}
      });

      peer.on('open', () => {
          serverStatus.textContent = "Online ✔";
          serverStatus.style.color = "#00ff00";
          statusMessage.textContent = "*** Lobby Active! You are the host node. Waiting for other computers to join...";
      });

      // If the primary ID is taken, it means someone else is already hosting. 
      // Connect to them as a peer node instead.
      peer.on('error', (err) => {
          if (err.type === 'id-taken') {
              console.log("Primary lobby node busy. Linking up as secondary client node...");
              connectToLobbyHost();
          }
      });

      // Catch incoming device line streams
      peer.on('connection', (incomingConnection) => {
          linkNewPeerNode(incomingConnection);
      });
  }

  function connectToLobbyHost() {
      // Create an independent fallback peer instance
      peer = new Peer({
          config: {'iceServers': [{ 'urls': 'stun:://google.com' }]}
      });

      peer.on('open', () => {
          serverStatus.textContent = "Online ✔";
          serverStatus.style.color = "#00ff00";
          statusMessage.textContent = "*** Connected successfully! Swarming mesh network clusters over WebRTC...";

          // Connect directly to the main global lobby host room
          const outboundLine = peer.connect(sharedGlobalLobbyId, {
              metadata: { alias: currentAlias, color: myHexColor }
          });
          linkNewPeerNode(outboundLine);
      });
  }

  function linkNewPeerNode(conn) {
      connectionPool.push(conn);

      conn.on('open', () => {
          if (statusMessage) statusMessage.remove();
          const remoteUser = conn.metadata?.alias || "Hacker";
          printSystemNotification(`*** User <${remoteUser}> has hopped inside your chat grid link!`);
      });

      // Handle receiving text packages from other computers over the live wire
      conn.on('data', (data) => {
          if (statusMessage) statusMessage.remove();

          // Anti-Collision Check: If incoming user matches your color, slide yours down
          if (data.sender !== currentAlias && data.color === myHexColor) {
              const safeList = availableColors.filter(c => c !== data.color);
              myHexColor = safeList[Math.floor(Math.random() * safeList.length)];
              document.getElementById('myUsername').style.color = myHexColor;
          }

          // If you are the host, forward this text packet to everyone else in the pool
          if (peer.id === sharedGlobalLobbyId) {
              connectionPool.forEach(activeNode => {
                  if (activeNode.open && activeNode.peer !== conn.peer) {
                      activeNode.send(data);
                  }
              });
          }

          appendRow(data.sender, data.text, data.color);
      });
  }

  // 3. Outbound Message Push Function
  function sendMsg() {
      const text = chatInput.value.trim();
      if (text === '') return;

      if (statusMessage) statusMessage.remove();
      
      const packet = { sender: currentAlias, text: text, color: myHexColor };

      // Print onto your own layout instantly
      appendRow(currentAlias, text, myHexColor);

      // Loop through connection pool array and dispatch packet internationally live
      connectionPool.forEach(conn => {
          if (conn.open) conn.send(packet);
      });

      chatInput.value = '';
  }

  function appendRow(sender, msgText, colorHex) {
      const row = document.createElement('div');
      row.innerHTML = `<span style="color: ${colorHex}; font-weight: bold;">&lt;${sender}&gt;</span> <span class="text-white">${msgText}</span>`;
      chatLog.appendChild(row);
      chatLog.scrollTop = chatLog.scrollHeight;
  }

  function printSystemNotification(text) {
      const row = document.createElement('div');
      row.className = 'sys-msg';
      row.textContent = text;
      chatLog.appendChild(row);
      chatLog.scrollTop = chatLog.scrollHeight;
  }

  // 4. Auto Clear on Refresh: Satisfies the rule beautifully
  window.addEventListener('beforeunload', () => {
      connectionPool = [];
      if (peer) peer.destroy();
  });

  // Launch Engine
  initializePeer();

  sendBtn.addEventListener('click', sendMsg);
  chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
