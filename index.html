<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CyberZone_95 Live Chatroom ⚡</title>
    <style>
        body { background-color: #000; color: #00FF00; font-family: "Courier New", Courier, monospace; padding: 15px; margin: 0; }
        .chat-window { border: 3px outset #808080; background-color: #c0c0c0; color: #000; width: 100%; max-width: 750px; margin: 0 auto; box-shadow: 5px 5px 0px #555; }
        .title-bar { background: linear-gradient(90deg, #000080, #0080fe); color: white; padding: 4px 8px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .title-controls span { background-color: #c0c0c0; color: black; border: 2px outset #fff; padding: 0 5px; font-size: 11px; cursor: pointer; margin-left: 2px; }
        marquee { background-color: #ff00ff; color: #ffffff; font-weight: bold; padding: 3px; font-size: 12px; border-bottom: 2px inset #fff; }
        .workspace { display: flex; background-color: #c0c0c0; padding: 10px; gap: 10px; }
        .chat-log { flex: 3; height: 300px; background-color: #000; color: #00ff00; border: 3px inset #808080; padding: 8px; overflow-y: scroll; font-size: 13px; line-height: 1.4; }
        .user-list { flex: 1; height: 300px; background-color: #000; color: #00ffff; border: 3px inset #808080; padding: 8px; overflow-y: auto; font-size: 13px; }
        .user-list h4 { color: #ffff00; margin: 0 0 8px 0; text-decoration: underline; font-size: 12px; }
        .sys-msg { color: #ffff00; }
        .user-tag { color: #ff00ff; font-weight: bold; }
        .my-tag { color: #00ffff; font-weight: bold; }
        .text-white { color: #ffffff; }
        .input-bar { background-color: #c0c0c0; padding: 10px; border-top: 2px solid #808080; display: flex; gap: 5px; }
        .input-bar input[type="text"] { flex: 1; background-color: #ffffff; color: #000000; border: 3px inset #808080; font-family: "Courier New", monospace; padding: 5px; font-size: 14px; outline: none; }
        
        /* Retro Command Buttons */
        .btn-95 { background-color: #c0c0c0; border: 2px outset #ffffff; font-family: "Courier New", monospace; font-weight: bold; padding: 5px 15px; cursor: pointer; font-size: 13px; }
        .btn-95:active { border: 2px inset #ffffff; }
        .btn-wipe { background-color: #ffc0c0; border: 2px outset #ffffff; font-family: "Courier New", monospace; font-weight: bold; padding: 5px 10px; cursor: pointer; font-size: 11px; margin-top: 15px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="chat-window">
    <div class="title-bar">
        <div>💬 CyberZone_95 Live Chatroom (v7.3 - Global Network)</div>
        <div class="title-controls"><span>_</span><span>X</span></div>
    </div>
    <marquee scrollamount="4">*** LUKE'S GLOBAL LOBBY OPERATIONAL *** STABLE TRANSMISSION HUB ACTIVE *** NO FLOODING ***</marquee>
    <div class="workspace">
        <div class="chat-log" id="chatLog">
            <div class="sys-msg" id="statusMessage">*** Connecting to global data matrix...</div>
        </div>
        <div class="user-list">
            <h4>YOUR PROFILE</h4>
            <div id="myUsername" style="color: #00ffff; font-weight: bold;"></div>
            <br>
            <div style="color: #ffff00; font-size: 11px;">SERVER STATUS:</div>
            <div style="color: #00ff00; font-size: 11px;">Online ✔</div>
            
            <!-- Manual Reset Control Dashboard Link -->
            <button id="wipeBtn" class="btn-wipe">WIPE LOBBY</button>
        </div>
    </div>
    <div class="input-bar">
        <input type="text" id="chatInput" placeholder="Type text here..." autocomplete="off" maxlength="150">
        <button id="sendBtn" class="btn-95">SEND</button>
    </div>
</div>
<div class="visitor-counter">YOU ARE HACKER VISITOR NUMBER: <span class="counter-badge">106842</span></div>

<script>
  const currentAlias = "Guest_" + Math.floor(Math.random() * 9000 + 1000);
  document.getElementById('myUsername').textContent = `• ${currentAlias}`;

  const chatLog = document.getElementById('chatLog');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const wipeBtn = document.getElementById('wipeBtn');
  let statusMessage = document.getElementById('statusMessage');

  // Dedicated data endpoint URL path route
  const routerUrl = "https://kvdb.io";
  let lastMessageCount = 0;

  // 1. Sync Loop: Continuously updates the chat logs screen from the web server
  function syncMessages() {
      fetch(routerUrl)
      .then(response => {
          if (!response.ok) return [];
          return response.json().catch(() => []);
      })
      .then(messagesList => {
          const statusText = document.getElementById('statusMessage');
          
          // Case A: Handhandle empty server states safely without execution breaks
          if (!Array.isArray(messagesList) || messagesList.length === 0) {
              if (!statusText) {
                  chatLog.innerHTML = `<div class="sys-msg" id="statusMessage">*** Room is empty! Type a message and hit SEND to broadcast live.</div>`;
              } else if (statusText.textContent.includes("Connecting")) {
                  statusText.textContent = "*** Room is empty! Type a message and hit SEND to broadcast live.";
              }
              lastMessageCount = 0;
              return;
          }
          
          // Remove placeholders once entries start streaming in
          if (statusText && !statusText.textContent.includes("empty")) { statusText.remove(); }

          // Case B: Handle sudden manual wipe clearing inputs across remote windows
          if (messagesList.length < lastMessageCount) {
              chatLog.innerHTML = `<div class="sys-msg" id="statusMessage">*** Room is empty! Type a message and hit SEND to broadcast live.</div>`;
              lastMessageCount = 0;
              return;
          }

          // Case C: Render brand new inbound text segments into view panels
          if (messagesList.length > lastMessageCount) {
              // Remove the empty room reminder text line right before appending real conversation entries
              const emptyTextNotice = document.getElementById('statusMessage');
              if (emptyTextNotice) emptyTextNotice.remove();

              const newEntries = messagesList.slice(lastMessageCount);
              
              newEntries.forEach(msg => {
                  const row = document.createElement('div');
                  const tagClass = (msg.sender === currentAlias) ? 'my-tag' : 'user-tag';
                  row.innerHTML = `<span class="${tagClass}">&lt;${msg.sender}&gt;</span> <span class="text-white">${msg.text}</span>`;
                  chatLog.appendChild(row);
              });
              
              chatLog.scrollTop = chatLog.scrollHeight;
              lastMessageCount = messagesList.length;
          }
      })
      .catch(err => console.log("Awaiting connection handshake stream..."));
  }

  // 2. Transmit: Packages input fields and pushes up to database stream
  function sendMsg() {
      const text = chatInput.value.trim();
      if (text === '') return;

      fetch(routerUrl)
      .then(res => {
          if (!res.ok) return [];
          return res.json().catch(() => []);
      })
      .then(currentHistory => {
          let updatedList = Array.isArray(currentHistory) ? currentHistory : [];
          updatedList.push({ sender: currentAlias, text: text });

          // Retain latest 40 entries maximum for optimal light browser scaling
          if (updatedList.length > 40) { updatedList.shift(); }

          return fetch(routerUrl, {
              method: 'PUT',
              body: JSON.stringify(updatedList)
          });
      })
      .then(() => {
          // Fire instantaneous refresh sweep to print your post onto view frame
          syncMessages();
      })
      .catch(err => console.error("Data push drop fault error:", err));

      chatInput.value = '';
  }

  // 3. Clear: Explicit button workflow method targeting server-level wiping operations
  function wipeLobby() {
      if (confirm("Are you sure you want to clear the entire chatroom history for everyone?")) {
          fetch(routerUrl, {
              method: 'PUT',
              body: JSON.stringify([])
          }).then(() => {
              syncMessages();
          });
      }
  }

  // Bind execution nodes
  sendBtn.addEventListener('click', sendMsg);
  chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
  wipeBtn.addEventListener('click', wipeLobby);

  // Initialize loop cadence cycle rates (2000ms polling checks)
  setInterval(syncMessages, 2000);
  syncMessages();
</script>
</body>
</html>
