<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background:#000;
    color:#0f0;
    font-family:Courier New;
    margin:0;
    padding:15px;
}

.chat-window {
    max-width:850px;
    margin:auto;
    background:#c0c0c0;
    border:3px outset #888;
}

.title-bar {
    background:linear-gradient(90deg,#000080,#0080ff);
    color:#fff;
    padding:6px;
    font-weight:bold;
}

.workspace { display:flex; gap:10px; padding:10px; }

.chat-log {
    flex:3;
    height:330px;
    background:#000;
    border:3px inset #888;
    overflow-y:auto;
    padding:8px;
}

.user-list {
    flex:1;
    background:#000;
    border:3px inset #888;
    color:#0ff;
    padding:8px;
    font-size:13px;
}

.input-bar {
    display:flex;
    gap:5px;
    padding:10px;
    background:#c0c0c0;
}

.input-bar input {
    flex:1;
    padding:6px;
}

.msg { color:#fff; }
.sys { color:yellow; }

img.chat-img {
    max-width:200px;
    border:2px solid #0f0;
    margin-top:5px;
}

/* typing */
#typingBox {
    color:black;
    font-size:18px;
    font-weight:bold;
    padding:6px 10px;
    min-height:22px;
}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>

<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<div id="typingBox"></div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message... (@mentions supported)">
<button id="sendBtn">Send</button>
</div>

</div>

<script>

// ================= USER =================
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ================= UI =================
const chatLog = document.getElementById("chatLog");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");
const typingBox = document.getElementById("typingBox");

// ================= TAB TITLE (DISCORD STYLE) =================
const baseTitle = "CyberZone_95 Chat";
let unread = 0;

function updateTitle(){
if(document.hidden && unread > 0){
document.title = `(${unread}) ${baseTitle}`;
} else {
document.title = baseTitle;
}
}

document.addEventListener("visibilitychange",()=>{
if(!document.hidden){
unread = 0;
updateTitle();
}
});

// ================= SOUND =================
const messageSound = new Audio("aim-message.mp3");
const mentionSound = new Audio("aim-notif.mp3");

function playMessage(){
messageSound.currentTime = 0;
messageSound.play().catch(()=>{});
}

function playMention(){
mentionSound.currentTime = 0;
mentionSound.play().catch(()=>{});
}

// ================= MQTT =================
const topic = "luke_retro_global_open_lobby";
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ================= DATA =================
const typingUsers = {};

// ================= HISTORY =================
const HISTORY_KEY = "cyberzone_chat_history";
let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");

function saveHistory(){
localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-100)));
}

history.forEach(h=>{
const div = document.createElement("div");
div.innerHTML = h;
chatLog.appendChild(div);
});

// ================= SYSTEM =================
function sys(t){
const d = document.createElement("div");
d.style.color = "yellow";
d.innerHTML = "*** " + t;
chatLog.appendChild(d);
}

// ================= RENDER =================
function render(text){

if(!text) return "";

// image
const img = /(https?:\/\/.*\.(png|jpg|jpeg|gif|webp))/i;
if(img.test(text)){
return `<img class="chat-img" src="${text}">`;
}

// 💛 DISCORD STYLE HIGHLIGHT
text = text.replaceAll(
"@" + currentAlias,
`<span style="color:yellow;font-weight:bold;">@${currentAlias}</span>`
);

return `<span class="msg">${text}</span>`;
}

// ================= TYPING =================
function updateTyping(){
const list = Object.keys(typingUsers).filter(u => u !== currentAlias);

typingBox.innerHTML = list.length
? list.join(", ") + " is typing..."
: "";
}

// ================= CONNECT =================
client.on("connect",()=>{
client.subscribe(topic);

client.publish(topic, JSON.stringify({
type:"join",
sender:currentAlias
}));
});

// ================= MESSAGE =================
client.on("message",(t,p)=>{
const d = JSON.parse(p.toString());

// JOIN
if(d.type === "join"){
sys(d.sender + " joined");
return;
}

// TYPING
if(d.type === "typing"){
typingUsers[d.sender] = true;
updateTyping();
return;
}

if(d.type === "stopTyping"){
delete typingUsers[d.sender];
updateTyping();
return;
}

let text = d.text || "";

// check mention
const isMention = text.includes("@" + currentAlias);

// sound logic FIXED (no double trigger)
if(d.sender !== currentAlias){
isMention ? playMention() : playMessage();
}

// unread counter
if(document.hidden && d.sender !== currentAlias){
unread++;
updateTitle();
}

// message row
const row = document.createElement("div");

const html =
`<span style="color:${d.sender===currentAlias?"#0ff":"#f0f"}">
<b>&lt;${d.sender}&gt;</b></span>
<span style="color:#0f0"> [${d.timestamp||"--:--"}] </span>
${render(text)}`;

row.innerHTML = html;
chatLog.appendChild(row);

// save history
history.push(html);
saveHistory();

chatLog.scrollTop = chatLog.scrollHeight;
});

// ================= TYPING SEND =================
chatInput.addEventListener("input",()=>{

client.publish(topic, JSON.stringify({
type:"typing",
sender:currentAlias
}));

clearTimeout(window.typingTimer);

window.typingTimer = setTimeout(()=>{
client.publish(topic, JSON.stringify({
type:"stopTyping",
sender:currentAlias
}));
},1000);

});

// ================= SEND =================
function send(){
let text = chatInput.value.trim();
if(!text) return;

client.publish(topic, JSON.stringify({
sender:currentAlias,
text:text,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
}));

chatInput.value = "";
}

sendBtn.onclick = send;

chatInput.addEventListener("keypress",(e)=>{
if(e.key === "Enter") send();
});

</script>

</body>
</html>
