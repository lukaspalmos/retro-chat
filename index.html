<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Live Chatroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#000; color:#0f0; font-family:Courier New; margin:0; padding:15px; }

.chat-window { max-width:800px; margin:auto; background:#c0c0c0; border:3px outset #888; }
.title-bar { background:linear-gradient(90deg,#000080,#0080ff); color:#fff; padding:6px; font-weight:bold; }

.workspace { display:flex; gap:10px; padding:10px; }

.chat-log {
    flex:3;
    height:320px;
    background:#000;
    border:3px inset #888;
    overflow-y:auto;
    padding:8px;
}

.user-list {
    flex:1;
    background:#000;
    border:3px inset #888;
    color:#0ff;
    padding:8px;
}

.input-bar {
    display:flex;
    gap:5px;
    padding:10px;
    background:#c0c0c0;
    flex-wrap:wrap;
}

.input-bar input {
    flex:1;
    padding:6px;
}

.msg { color:#fff; }
.sys { color:yellow; }
img.chat-img { max-width:200px; border:2px solid #0f0; margin-top:5px; }

/* ---------- EMOJI BOX ---------- */
#emojiBox {
    width:100%;
    background:#000;
    border:2px inset #888;
    color:#0ff;
    font-size:12px;
    padding:4px;
    display:none;
}

.emoji-item {
    padding:2px;
    cursor:pointer;
}
.emoji-item:hover {
    background:#111;
}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>

<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<!-- 👇 EMOJI SUGGESTIONS -->
<div id="emojiBox"></div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message... (:sob: :fire: :heart:)">
<button id="sendBtn">Send</button>
</div>

</div>

<script>

// ---------- USER ----------
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ---------- UI ----------
const chatLog = document.getElementById("chatLog");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");
const emojiBox = document.getElementById("emojiBox");

// ---------- EMOJI MAP ----------
const emojis = {
    ":sob:":"😭",
    ":fire:":"🔥",
    ":heart:":"❤️",
    ":skull:":"💀",
    ":joy:":"😂",
    ":cool:":"😎",
    ":wave:":"👋",
    ":thumbsup:":"👍"
    ":broken:":"💔"
    ":speak:":"🗣️"
    ":peak:":"🥹"
    ":twin:":"✌️"
    ":wilt:":"🥀"
};

// ---------- SOUND ----------
const aimSound = new Audio("aim-message.mp3");
function playSound(){
    aimSound.currentTime=0;
    aimSound.play().catch(()=>{});
}

// ---------- MQTT ----------
const topic="luke_retro_global_open_lobby";
const client=mqtt.connect("wss://broker.emqx.io:8084/mqtt");

const users={};

// ---------- SYSTEM ----------
function sys(t){
    const d=document.createElement("div");
    d.innerHTML="*** "+t;
    d.style.color="yellow";
    chatLog.appendChild(d);
}

// ---------- RENDER ----------
function render(text){
    const img=/(https?:\/\/.*\.(png|jpg|jpeg|gif|webp))/i;
    if(img.test(text)) return `<img class="chat-img" src="${text}">`;
    return `<span class="msg">${text}</span>`;
}

// ---------- EMOJI REPLACE ----------
function parseEmojis(text){
    Object.keys(emojis).forEach(code=>{
        text=text.split(code).join(emojis[code]);
    });
    return text;
}

// ---------- CONNECT ----------
client.on("connect",()=>{
    client.subscribe(topic);
    client.publish(topic, JSON.stringify({
        type:"join",
        sender:currentAlias
    }));
});

// ---------- MESSAGE ----------
client.on("message",(t,p)=>{
    const d=JSON.parse(p.toString());

    if(d.type==="join"){
        users[d.sender]=Date.now();
        sys(d.sender+" joined");
        return;
    }

    users[d.sender]=Date.now();
    if(d.sender!==currentAlias) playSound();

    const row=document.createElement("div");
    row.innerHTML=
    `<span style="color:${d.sender===currentAlias?"#0ff":"#f0f"}">
    <b>&lt;${d.sender}&gt;</b></span>
    <span style="color:#0f0"> [${d.timestamp}] </span>
    ${render(d.text)}`;

    chatLog.appendChild(row);
});

// ---------- EMOJI SUGGESTIONS ----------
chatInput.addEventListener("input",()=>{

    const value=chatInput.value;
    const match=value.match(/:[a-zA-Z0-9_]*$/);

    if(match){
        const query=match[0];

        const results=Object.keys(emojis)
        .filter(e=>e.startsWith(query))
        .slice(0,5);

        if(results.length){
            emojiBox.style.display="block";
            emojiBox.innerHTML=results.map(e=>
                `<div class="emoji-item" onclick="insertEmoji('${e}')">
                    ${e} → ${emojis[e]}
                </div>`
            ).join("");
        } else {
            emojiBox.style.display="none";
        }

    } else {
        emojiBox.style.display="none";
    }
});

// ---------- INSERT EMOJI ----------
window.insertEmoji=function(code){
    const val=chatInput.value;
    const newVal=val.replace(/:[a-zA-Z0-9_]*$/,code);
    chatInput.value=newVal;
    emojiBox.style.display="none";
    chatInput.focus();
};

// ---------- SEND ----------
function send(){
    let text=chatInput.value.trim();
    if(!text) return;

    if(text==="/clear"){
        chatLog.innerHTML="";
        sys("cleared");
        chatInput.value="";
        return;
    }

    if(text.startsWith("/nick ")){
        currentAlias=text.replace("/nick ","");
        sys("you are now "+currentAlias);
        chatInput.value="";
        return;
    }

    text=parseEmojis(text);

    client.publish(topic, JSON.stringify({
        sender:currentAlias,
        text:text,
        timestamp:new Date().toLocaleTimeString([],{
            hour:"numeric",
            minute:"2-digit"
        })
    }));

    chatInput.value="";
}

// ---------- EVENTS ----------
sendBtn.onclick=send;
chatInput.addEventListener("keypress",e=>{
    if(e.key==="Enter") send();
});

</script>

</body>
</html>
