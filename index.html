<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CyberZone_95 Chatroom ⚡</title>
    <!-- Load the real-time communication engine -->
    <script src="https://pubnub.com"></script>
    <style>
        body {
            background-color: #000000;
            color: #00FF00;
            font-family: "Courier New", Courier, monospace;
            padding: 15px;
            margin: 0;
        }
        .chat-window {
            border: 3px outset #808080;
            background-color: #c0c0c0;
            color: #000;
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
            box-shadow: 5px 5px 0px #555555;
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #0080fe);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title-controls span {
            background-color: #c0c0c0;
            color: black;
            border: 2px outset #fff;
            padding: 0 5px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 2px;
        }
        marquee {
            background-color: #ff00ff;
            color: #ffffff;
            font-weight: bold;
            padding: 3px;
            font-size: 12px;
            border-bottom: 2px inset #fff;
        }
        .workspace {
            display: flex;
            background-color: #c0c0c0;
            padding: 10px;
            gap: 10px;
        }
        .chat-log {
            flex: 3;
            height: 300px;
            background-color: #000000;
            color: #00ff00;
            border: 3px inset #808080;
            padding: 8px;
            overflow-y: scroll;
            font-size: 13px;
            line-height: 1.4;
        }
        .user-list {
            flex: 1;
            height: 300px;
            background-color: #000000;
            color: #00ffff;
            border: 3px inset #808080;
            padding: 8px;
            overflow-y: auto;
            font-size: 13px;
        }
        .user-list h4 {
            color: #ffff00;
            margin: 0 0 8px 0;
            text-decoration: underline;
            font-size: 12px;
        }
        .sys-msg { color: #ffff00; }
        .user-tag { color: #ff00ff; font-weight: bold; }
        .my-tag { color: #00ffff; font-weight: bold; }
        .text-white { color: #ffffff; }
        .input-bar {
            background-color: #c0c0c0;
            padding: 10px;
            border-top: 2px solid #808080;
            display: flex;
            gap: 5px;
        }
        .input-bar input[type="text"] {
            flex: 1;
            background-color: #ffffff;
            color: #000000;
            border: 3px inset #808080;
            font-family: "Courier New", monospace;
            padding: 5px;
            font-size: 14px;
            outline: none;
        }
        .input-bar button {
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            font-family: "Courier New", monospace;
            font-weight: bold;
            padding: 0 15px;
            cursor: pointer;
        }
        .input-bar button:active { border: 2px inset #ffffff; }
        .visitor-counter { text-align: center; margin-top: 15px; font-size: 12px; color: #888; }
        .counter-badge { background: #222; color: #ff0000; padding: 2px 6px; border: 1px solid #444; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="chat-window">
    <div class="title-bar">
        <div>💬 CyberZone_95 Live Chatroom (v2.0)</div>
        <div class="title-controls"><span>_</span><span>X</span></div>
    </div>

    <marquee scrollamount="4">*** CHATROOM IS NOW LIVE ONLINE *** SHARE THE URL WITH FRIENDS TO DISCUSS *** NO FLOODING ***</marquee>

    <div class="workspace">
        <div class="chat-log" id="chatLog">
            <div class="sys-msg">*** Connecting to global server node...</div>
        </div>

        <div class="user-list">
            <h4>YOUR PROFILE</h4>
            <div id="myUsername" style="color: #00ffff; font-weight: bold;"></div>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="chatInput" placeholder="Type text here..." autocomplete="off" maxlength="150">
        <button id="sendBtn">SEND</button>
    </div>
</div>

<div class="visitor-counter">
    YOU ARE HACKER VISITOR NUMBER: <span class="counter-badge">059124</span>
</div>

<script>
    // Generate a permanent, random 90s username for this session
    const username = "Guest_" + Math.floor(Math.random() * 9000 + 1000);
    document.getElementById('myUsername').textContent = `• ${username}`;

    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    // Initialize PubNub with public demo sandbox channels
    const pubnub = new PubNub({
        publishKey: 'pub-c-7ab7b36f-e8b8-4c12-9c32-be9bc451b6a1',
        subscribeKey: 'sub-c-18a0b0be-090c-4076-a07c-9b5a839f99bc',
        userId: username
    });

    // 1. Send Message to the entire network
    function sendMsg() {
        const text = chatInput.value.trim();
        if (text === '') return;

        pubnub.publish({
            channel: '90s_retro_room',
            message: {
                sender: username,
                text: text
            }
        });

        chatInput.value = '';
    }

    // 2. Receive incoming messages from anyone in the world
    pubnub.addListener({
        message: function(event) {
            const data = event.message;
            const messageRow = document.createElement('div');
            
            // Apply unique color tag if you are the speaker
            const tagClass = (data.sender === username) ? 'my-tag' : 'user-tag';
            
            messageRow.innerHTML = `<span class="${tagClass}">&lt;${data.sender}&gt;</span> <span class="text-white">${data.text}</span>`;
            chatLog.appendChild(messageRow);
            chatLog.scrollTop = chatLog.scrollHeight;
        },
        status: function(statusEvent) {
            if (statusEvent.category === "PNConnectedCategory") {
                const sysRow = document.createElement('div');
                sysRow.className = 'sys-msg';
                sysRow.textContent = `*** Connection established! You entered the lobby as ${username}.`;
                chatLog.appendChild(sysRow);
            }
        }
    });

    // Subscribe to our shared global chat channel
    pubnub.subscribe({
        channels: ['90s_retro_room']
    });

    // Button event listeners
    sendBtn.addEventListener('click', sendMsg);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMsg();
    });
</script>

</body>
</html>
