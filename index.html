<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberZone_95 Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#000;
color:#0f0;
font-family:Courier New;
margin:0;
padding:15px;
}

.chat-window{
max-width:900px;
margin:auto;
background:#c0c0c0;
border:3px outset #888;
}

.title-bar{
background:linear-gradient(90deg,#000080,#0080ff);
color:#fff;
padding:6px;
font-weight:bold;
}

.workspace{display:flex;gap:10px;padding:10px;}

.chat-log{
flex:3;
height:340px;
background:#000;
border:3px inset #888;
overflow-y:auto;
padding:8px;
}

.user-list{
flex:1;
background:#000;
border:3px inset #888;
color:#0ff;
padding:8px;
font-size:13px;
}

.input-bar{
display:flex;
gap:5px;
padding:10px;
background:#c0c0c0;
flex-wrap:wrap;
}

.input-bar input{
flex:1;
padding:6px;
}

.msg{color:#fff;}
.sys{color:yellow;}

#replyBox{
display:none;
background:#111;
color:yellow;
padding:5px;
margin:5px 10px;
border-left:4px solid yellow;
font-size:12px;
}

button{cursor:pointer;}
</style>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<div class="chat-window">
<div class="title-bar">💬 CyberZone_95 Chat</div>

<div class="workspace">
<div class="chat-log" id="chatLog"></div>
<div class="user-list">
<div style="color:yellow;">ONLINE USERS</div>
<div id="userListBox"></div>
</div>
</div>

<div id="replyBox"></div>

<div class="input-bar">
<input id="chatInput" placeholder="Type message...">
<button id="sendBtn">Send</button>
<button id="imgBtn">Image</button>
<button id="clearBtn">Clear</button>
<input type="file" id="imgUpload" hidden>
</div>

</div>

<script>

// ================= USER =================
let currentAlias = "Guest_" + Math.floor(Math.random()*9000);

// ================= UI =================
const chatLog=document.getElementById("chatLog");
const chatInput=document.getElementById("chatInput");
const sendBtn=document.getElementById("sendBtn");
const clearBtn=document.getElementById("clearBtn");
const imgBtn=document.getElementById("imgBtn");
const imgUpload=document.getElementById("imgUpload");
const replyBox=document.getElementById("replyBox");
const userListBox=document.getElementById("userListBox");

// ================= MQTT =================
const topic="luke_retro_global_open_lobby";
const client=mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ================= DATA =================
const users={};
let replyTarget=null;

// ================= SOUND =================
const notif=new Audio("aim-notif.mp3");

// ================= EMOJIS =================
const emojis={
":sob:":"😭",
":fire:":"🔥",
":heart:":"❤️",
":skull:":"💀",
":joy:":"😂",
":cool:":"😎",
":wave:":"👋",
":thumbsup:":"👍"
};

function parseEmojis(text){
Object.keys(emojis).forEach(k=>{
text=text.split(k).join(emojis[k]);
});
return text;
}

// ================= SYSTEM =================
function sys(t){
const d=document.createElement("div");
d.className="sys";
d.textContent="*** "+t;
chatLog.appendChild(d);
}

// ================= USERS =================
function updateUsers(){
const now=Date.now();
userListBox.innerHTML="";

Object.keys(users).forEach(u=>{
if(now-users[u]<60000){
const d=document.createElement("div");
d.textContent="• "+u;
userListBox.appendChild(d);
}
});
}

// ================= MENTION HIGHLIGHT =================
function highlight(text){
const safe=currentAlias.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
return text.replaceAll("@"+currentAlias,
`<span style="color:yellow;font-weight:bold;">@${currentAlias}</span>`
);
}

// ================= CONNECT =================
client.on("connect",()=>{
client.subscribe(topic);

client.publish(topic,JSON.stringify({
type:"join",
sender:currentAlias
}));
});

// ================= MESSAGE =================
client.on("message",(t,p)=>{
const d=JSON.parse(p.toString());

if(d.type==="join"){
users[d.sender]=Date.now();
sys(d.sender+" joined");
updateUsers();
return;
}

if(d.text!==undefined){

users[d.sender]=Date.now();
updateUsers();

let text=d.text;

// emojis FIRST
text=parseEmojis(text);

// mention highlight
text=highlight(text);

// image detection
const img=/https?:\/\/.*\.(png|jpg|jpeg|gif|webp)/i;
if(img.test(text)){
text=`<img src="${text}" style="max-width:200px;border:2px solid #0f0;">`;
}

// reply block
let replyHTML="";
if(d.reply){
replyHTML=
`<div style="color:yellow;font-size:11px;border-left:4px solid yellow;padding-left:6px;margin-bottom:4px;background:#111;">
↳ reply to <b>${d.reply.user}</b>: ${d.reply.text}
</div>`;

notif.currentTime=0;
notif.play().catch(()=>{});
}

const row=document.createElement("div");

row.innerHTML=
replyHTML+
`<b style="color:${d.sender===currentAlias?"#0ff":"#f0f"}">
&lt;${d.sender}&gt;</b>
<span style="color:#0f0"> [${d.timestamp}] </span>
<span style="color:#fff">${text}</span>

<button onclick="setReply('${d.sender}','${d.text.replace(/'/g,"")}')"
style="margin-left:10px;font-size:10px;">Reply</button>`;

chatLog.appendChild(row);
chatLog.scrollTop=chatLog.scrollHeight;
}
});

// ================= REPLY =================
window.setReply=function(user,text){
replyTarget={user,text};
replyBox.style.display="block";
replyBox.innerHTML="↳ Replying to <b>"+user+"</b>: "+text;
};

// ================= SEND =================
function send(){
let text=chatInput.value.trim();
if(!text)return;

// /nick FIXED
if(text.startsWith("/nick ")){
currentAlias=text.replace("/nick ","");
sys("you are now "+currentAlias);
chatInput.value="";
return;
}

// clear
if(text==="/clear"){
chatLog.innerHTML="";
sys("chat cleared");
chatInput.value="";
return;
}

text=parseEmojis(text);

const payload={
sender:currentAlias,
text,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
};

if(replyTarget){
payload.reply=replyTarget;
replyTarget=null;
replyBox.style.display="none";
}

client.publish(topic,JSON.stringify(payload));
chatInput.value="";
}

// ================= IMAGE UPLOAD =================
imgBtn.onclick=()=>imgUpload.click();

imgUpload.onchange=async e=>{
const file=e.target.files[0];
if(!file)return;

const form=new FormData();
form.append("file",file);
form.append("upload_preset","chat_upload");

const res=await fetch("https://api.cloudinary.com/v1_1/dbrruuftv/image/upload",{
method:"POST",
body:form
});

const data=await res.json();

client.publish(topic,JSON.stringify({
sender:currentAlias,
text:data.secure_url,
timestamp:new Date().toLocaleTimeString([],{
hour:"numeric",
minute:"2-digit"
})
}));
};

// ================= EVENTS =================
sendBtn.onclick=send;

chatInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault();
send();
}
});

clearBtn.onclick=()=>{
chatLog.innerHTML="";
sys("chat cleared");
};

</script>

</body>
</html>
